# ══════════════════════════════════════════════════════════════════════════════
# ImmoMaroc — Nginx configuration
#
# Request routing:
#   /                        → React SPA (static files)
#   /uploads/                → served directly from Docker volume (NOT proxied)
#   /api/notifications/*     → Spring Boot SSE (buffering disabled)
#   /api/*                   → Spring Boot REST API (proxied)
#
# The uploads_data Docker volume is mounted on BOTH the backend container
# (write) and this nginx container (read-only), so images are served
# directly by Nginx — no round-trip through the JVM.
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name  158.220.105.26;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-XSS-Protection        "1; mode=block"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        image/svg+xml;

    # ── React static assets — long cache (Vite adds content hash to filenames) ─
    location ~* \.(js|css|png|jpg|jpeg|webp|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Uploaded property images — served DIRECTLY from Docker volume ─────────
    # The uploads_data volume is mounted at /var/immomaroc/uploads/ (read-only)
    # on this container. No proxy to the backend needed.
    location ^~ /uploads/ {
        alias /var/immomaroc/uploads/;

        # Long cache — filenames are UUIDs so they never clash
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # Deny access to anything that is not an image
        location ~* \.(php|sh|py|rb|pl|cgi|exe|bat)$ {
            deny all;
        }
    }

    # ── SSE (Server-Sent Events) — MUST come before /api/ block ──────────────
    # Covers both:
    #   /api/notifications/stream        (admin)
    #   /api/notifications/agent/stream  (agent)
    #
    # Key settings: proxy_buffering off + proxy_cache off + Connection ''
    # Without these, Nginx buffers the stream and events never reach the client.
    location /api/notifications {
        proxy_pass          http://backend:8090/api/notifications;
        proxy_http_version  1.1;

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Cookie            $http_cookie;

        # Disable keep-alive on upstream (required for SSE)
        proxy_set_header    Connection        "";

        # Disable ALL buffering — SSE must stream token by token
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_read_timeout          3600s;
        proxy_send_timeout          3600s;
        chunked_transfer_encoding   on;

        # Do not compress SSE — interferes with chunked transfer
        gzip off;
    }

    # ── OG / Social preview pages (WhatsApp, Facebook crawler) ──────────────
    location /og/ {
        proxy_pass          http://backend:8090/og/;
        proxy_http_version  1.1;

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # ── Backend REST API proxy ────────────────────────────────────────────────
    location /api/ {
        proxy_pass          http://backend:8090/api/;
        proxy_http_version  1.1;

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Cookie            $http_cookie;

        # Needed for multipart image uploads (max 50 MB — matches Spring config)
        client_max_body_size  50m;

        # Generous timeouts for slow DB queries and translation API calls
        proxy_read_timeout    90s;
        proxy_send_timeout    90s;
        proxy_connect_timeout 10s;

        # Buffer tuning for larger JSON responses (property listings with images)
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
        proxy_busy_buffers_size 64k;
    }

    # ── React SPA catch-all — MUST be last ────────────────────────────────────
    # All unknown paths (e.g. /recherche, /propriete/42, /agent/leads)
    # fall back to index.html so React Router handles them client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}